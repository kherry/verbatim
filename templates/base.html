<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Transcriber{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #161616;
      --border:    #2a2a2a;
      --accent:    #e8ff47;
      --accent2:   #47ffe8;
      --text:      #e8e8e8;
      --muted:     #666;
      --danger:    #ff4747;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
      --radius:    4px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
    }

    /* Subtle grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      text-decoration: none;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .logo span { color: var(--muted); }

    main {
      flex: 1;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 32px;
    }

    h1 {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: .04em;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 40px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 10px 20px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      text-decoration: none;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { opacity: .88; }
    .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--muted); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { opacity: .85; }
    .btn:disabled { opacity: .35; cursor: not-allowed; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    /* Status badge */
    .status-badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
      background: var(--border);
      color: var(--muted);
    }
    .status-badge.active   { background: rgba(232,255,71,.15); color: var(--accent); }
    .status-badge.done     { background: rgba(71,255,232,.15); color: var(--accent2); }
    .status-badge.error    { background: rgba(255,71,71,.15);  color: var(--danger); }

    /* Flash / error box */
    .alert {
      padding: 14px 18px;
      border-radius: var(--radius);
      font-size: 14px;
      margin-bottom: 20px;
    }
    .alert-error { background: rgba(255,71,71,.1); border: 1px solid rgba(255,71,71,.3); color: #ff9090; }

    /* Monospace labels */
    .label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<div class="page">
  <header>
    <a href="/" class="logo">Trans<span>//</span>criber</a>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</div>
{% block scripts %}{% endblock %}
</body>
</html>
